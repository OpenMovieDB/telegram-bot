namespace: kinopoisk

replicas: 1

images:
  registry: pkg.sourcecraft.tech/cr/kinoflow/cn1n61b2au3n9cc77tas
  name: kp-bot
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: regcred-sourcecraft

# Pod env is sourced entirely from this pre-existing k8s Secret (envFrom).
# Required keys: BOT_TOKEN, REDIS_URL, CHAT_ID, ADMIN_CHAT_ID,
#   AUTH_SERVICE_URL, AUTH_SERVICE_TOKEN (identity, service-token label "bot"),
#   ACCOUNT_SERVICE_URL, ACCOUNT_SERVICE_TOKEN (entitlement, label "bot"),
#   BILLING_SERVICE_URL, BILLING_SERVICE_TOKEN, NATS_URL, UPDATE_API_BASE_URL.
existingSecret: kp-bot

port: 3000

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"
