version: '3.8'

services:
  bot:
    build: 
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - BOT_TOKEN=${BOT_TOKEN}
      - REDIS_URL=${REDIS_URL}
      - CHAT_ID=${CHAT_ID}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID}
      - ACCOUNT_SERVICE_URL=${ACCOUNT_SERVICE_URL}
      - ACCOUNT_SERVICE_TOKEN=${ACCOUNT_SERVICE_TOKEN}
      - BILLING_SERVICE_URL=${BILLING_SERVICE_URL}
      - BILLING_SERVICE_TOKEN=${BILLING_SERVICE_TOKEN}
      - NATS_URL=${NATS_URL}
      - UPDATE_API_BASE_URL=${UPDATE_API_BASE_URL}
      # The Dockerfile HEALTHCHECK curls :3000 — keep the HTTP server on.
      - ENABLE_HTTP_SERVER=true
    ports:
      - "3000:3000"
    networks:
      - bot-network
    dns:
      - 8.8.8.8
      - 8.8.4.4
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  bot-network:
    driver: bridge